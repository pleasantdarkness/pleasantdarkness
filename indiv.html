<html>
  <head>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&amp;family=Newsreader%3Awght%40400%3B500%3B700%3B800&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900"
    />

    <title>Galileo Design</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  </head>
  <body>
    <div class="relative flex size-full min-h-screen flex-col bg-slate-50 group/design-root overflow-x-hidden" style='font-family: Newsreader, "Noto Sans", sans-serif;'>
      <div class="flex items-center bg-slate-50 p-4 pb-2 justify-between">
        <h2 class="text-[#0e141b] text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pl-12">What's the point of poetry?</h2>
        <div class="flex w-12 items-center justify-end">
          <button
            class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 bg-transparent text-[#0e141b] gap-2 text-base font-bold leading-normal tracking-[0.015em] min-w-0 p-0"
          >
            <div class="text-[#0e141b]" data-icon="Share" data-size="24px" data-weight="regular">
              <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" fill="currentColor" viewBox="0 0 256 256">
                <path
                  d="M229.66,109.66l-48,48a8,8,0,0,1-11.32-11.32L204.69,112H165a88,88,0,0,0-85.23,66,8,8,0,0,1-15.5-4A103.94,103.94,0,0,1,165,96h39.71L170.34,61.66a8,8,0,0,1,11.32-11.32l48,48A8,8,0,0,1,229.66,109.66ZM192,208H40V88a8,8,0,0,0-16,0V208a16,16,0,0,0,16,16H192a8,8,0,0,0,0-16Z"
                ></path>
              </svg>
            </div>
          </button>
        </div>
      </div>
      <h4 class="text-[#4e7397] text-sm font-bold leading-normal tracking-[0.015em] px-4 py-2 text-center">Sections</h4>
      <div class="flex gap-3 p-3 overflow-x-hidden">
        <div class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-[#e7edf3] pl-4 pr-4">
          <p class="text-[#0e141b] text-sm font-medium leading-normal">Poetry</p>
        </div>
        <div class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-[#e7edf3] pl-4 pr-4">
          <p class="text-[#0e141b] text-sm font-medium leading-normal">Articles</p>
        </div>
        <div class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-[#e7edf3] pl-4 pr-4">
          <p class="text-[#0e141b] text-sm font-medium leading-normal">Journal</p>
        </div>
      </div>
      <p class="text-[#0e141b] text-base font-normal leading-normal pb-3 pt-1 px-4">
        In a world that is increasingly transactional and profit-driven, poetry offers a space for us to slow down and appreciate things that are not easily quantifiable. It's a
        space for reflection and contemplation.
      </p>
      <div class="flex w-full grow bg-slate-50 @container p-4">
        <div class="w-full gap-1 overflow-hidden bg-slate-50 @[480px]:gap-2 aspect-[3/2] rounded-xl flex">
          <div
            class="w-full bg-center bg-no-repeat bg-cover aspect-auto rounded-none flex-1"
            style='background-image: url("https://cdn.usegalileo.ai/stability/91c6eb93-ca82-4c19-941d-1a0fb01b4b4d.png");'
          ></div>
        </div>
      </div>
      <div class="flex px-4 py-3">
        <button
          class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-5 flex-1 bg-[#1980e6] text-slate-50 text-base font-bold leading-normal tracking-[0.015em]"
        >
          <span class="truncate">Read more articles</span>
        </button>
      </div>
      <p class="text-[#4e7397] text-sm font-normal leading-normal pb-3 pt-1 px-4 text-center">Join our community on</p>
      <div class="flex items-center px-4 py-3 justify-center">
        <div class="overflow-visible w-[34px]">
          <div
            class="bg-center bg-no-repeat aspect-square bg-cover border-slate-50 bg-[#e7edf3] text-[#4e7397] rounded-full flex items-center justify-center size-11 border-4"
            style='background-image: url("https://cdn.usegalileo.ai/stability/64138716-2c66-4e91-8219-9054b6296694.png");'
          ></div>
        </div>
        <div class="overflow-visible w-[34px]">
          <div
            class="bg-center bg-no-repeat aspect-square bg-cover border-slate-50 bg-[#e7edf3] text-[#4e7397] rounded-full flex items-center justify-center size-11 border-4"
            style='background-image: url("https://cdn.usegalileo.ai/stability/eac65ce9-a52f-4d9d-86e1-0a577d9b4dfb.png");'
          ></div>
        </div>
        <div class="overflow-visible w-[34px]">
          <div
            class="bg-center bg-no-repeat aspect-square bg-cover border-slate-50 bg-[#e7edf3] text-[#4e7397] rounded-full flex items-center justify-center size-11 border-4"
            style='background-image: url("https://cdn.usegalileo.ai/stability/62c5e7a9-d7e4-4089-b5fc-715ff2b606b9.png");'
          ></div>
        </div>
        <div class="overflow-visible w-[34px]">
          <div
            class="bg-center bg-no-repeat aspect-square bg-cover border-slate-50 bg-[#e7edf3] text-[#4e7397] rounded-full flex items-center justify-center size-11 border-4"
            style='background-image: url("https://cdn.usegalileo.ai/stability/d9142fae-daf7-47a1-a933-9fd3ab97b617.png");'
          ></div>
        </div>
        <div class="overflow-visible w-11">
          <div
            class="bg-center bg-no-repeat aspect-square bg-cover border-slate-50 bg-[#e7edf3] text-[#4e7397] rounded-full flex items-center justify-center size-11 border-4"
            style='background-image: url("https://cdn.usegalileo.ai/stability/64309ae6-eb8f-469a-afed-a342530ad2a9.png");'
          ></div>
        </div>
      </div>
      <div class="h-5 bg-slate-50"></div>
    </div>
  </body>
</html>
